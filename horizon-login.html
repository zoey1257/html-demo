<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Horizon — Sign in (integrity twin)</title>
<style>
  :root{--fade:1600ms;--kb:8000ms;--lime:#c8e51f;--amber:#f5a623;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;min-height:100dvh;}

  .slideshow-bg{position:fixed;inset:0;z-index:0;overflow:hidden;background:#070d1c;}
  .slideshow-bg__slide{position:absolute;inset:0;opacity:0;transition:opacity var(--fade) ease-in-out;}
  .slideshow-bg__slide.is-active{opacity:1;}
  .slideshow-bg__slide img{width:100%;height:100%;object-fit:cover;object-position:center 55%;
    transform:scale(1.05);transition:transform var(--kb) ease-out;will-change:transform;}
  .slideshow-bg__slide.is-active img{transform:scale(1.14) translate(1.2%,-1%);}
  .slideshow-bg__scrim{position:absolute;inset:0;z-index:2;
    background:linear-gradient(180deg, rgba(7,13,28,.52) 0%, rgba(7,13,28,.42) 40%, rgba(7,13,28,.72) 100%);}

  .twin{position:fixed;inset:0;z-index:1;pointer-events:none;
    -webkit-mask-image:linear-gradient(90deg,transparent 0%,transparent 18%,#000 42%,#000 100%);
            mask-image:linear-gradient(90deg,transparent 0%,transparent 18%,#000 42%,#000 100%);}
  .twin canvas{width:100%;height:100%;display:block;}
  .hud{position:fixed;inset:0;z-index:1;pointer-events:none;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  .chip{position:absolute;display:flex;align-items:center;gap:.5rem;padding:.45rem .7rem;
    background:rgba(10,16,26,.42);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
    border:1px solid rgba(200,229,31,.22);border-radius:9px;box-shadow:0 6px 22px rgba(0,0,0,.3);
    opacity:0;animation:chipIn .8s ease forwards;}
  .chip .dot{width:7px;height:7px;border-radius:50%;background:var(--lime);box-shadow:0 0 8px var(--lime);animation:blink 2.4s ease-in-out infinite;}
  .chip .k{font-size:9px;letter-spacing:.1em;color:#aeb0b3;text-transform:uppercase;line-height:1.3;}
  .chip .v{font-size:13px;color:#eef0ea;font-weight:600;line-height:1.2;font-variant-numeric:tabular-nums;}
  .chip .v b{color:var(--lime);font-weight:700;}
  .caption{position:fixed;top:max(18px,env(safe-area-inset-top));right:20px;z-index:1;pointer-events:none;
    display:flex;align-items:center;gap:.45rem;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
    font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(200,229,31,.55);}
  .caption .dot{width:6px;height:6px;border-radius:50%;background:var(--lime);box-shadow:0 0 7px var(--lime);animation:blink 2.4s ease-in-out infinite;}
  @keyframes chipIn{to{opacity:1;}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}

  .screen{position:fixed;inset:0;z-index:2;overflow-y:auto;display:flex;min-height:100dvh;
    padding:clamp(1rem,4dvh,2.5rem) clamp(1rem,5vw,2rem);
    padding-left:max(clamp(1rem,5vw,2rem),env(safe-area-inset-left));
    padding-right:max(clamp(1rem,5vw,2rem),env(safe-area-inset-right));}
  .card{margin:auto;width:100%;max-width:24rem;border-radius:.9rem;padding:clamp(1.5rem,5vw,2rem);
    background:rgba(20,22,26,.55);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.10);box-shadow:0 24px 70px rgba(0,0,0,.45);}
  .brand{display:flex;align-items:center;gap:.6rem;margin-bottom:1.75rem;}
  .brand img{display:block;width:30px;height:30px;}
  .brand .name{font-size:13px;font-weight:600;text-transform:uppercase;line-height:1;color:#9a9b9c;letter-spacing:.14em;}
  h1{font-size:clamp(19px,4.6vw,21px);font-weight:600;margin-bottom:.25rem;color:#f0f0f1;}
  .sub{font-size:13px;margin-bottom:1.5rem;color:#9a9b9c;line-height:1.4;}
  form{display:flex;flex-direction:column;gap:1rem;}
  .lbl{display:flex;flex-direction:column;gap:.375rem;}
  .lbl span{font-size:11px;text-transform:uppercase;font-weight:600;color:#9a9b9c;letter-spacing:.1em;}
  input{width:100%;border-radius:.5rem;padding:.6rem .75rem;font-size:16px;outline:none;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#f0f0f1;}
  input:focus{border-color:rgba(200,229,31,.55);background:rgba(255,255,255,.10);}
  .btn{border-radius:.5rem;padding:.65rem .75rem;font-size:14px;font-weight:600;background:var(--lime);color:#161718;border:none;cursor:pointer;}
  .forgot{font-size:12px;text-align:center;color:#9a9b9c;text-decoration:none;}
  .dots{position:fixed;left:50%;transform:translateX(-50%);bottom:max(22px,env(safe-area-inset-bottom));z-index:3;display:flex;gap:9px;}
  .dots i{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.4);transition:background .3s,width .3s;}
  .dots i.on{background:var(--lime);width:20px;border-radius:4px;}

  @media (min-width:768px){
    .screen{padding-inline:0;}
    .card{margin:auto auto auto clamp(2rem,7vw,7rem);}
    .slideshow-bg__scrim{background:
      linear-gradient(90deg, rgba(7,13,28,.85) 0%, rgba(7,13,28,.55) 26%, rgba(7,13,28,.12) 58%, rgba(7,13,28,0) 100%),
      linear-gradient(0deg, rgba(7,13,28,.40) 0%, rgba(7,13,28,0) 32%);}
    .dots{left:clamp(2rem,7vw,7rem);transform:none;}
    input{font-size:14px;}
  }
  @media (min-width:1600px){ .card{margin-left:clamp(7rem,9vw,11rem);} }
  @media (max-width:767px){ .twin{opacity:.45;} .hud,.caption{display:none;} }

  @media (prefers-reduced-motion:reduce){:root{--fade:600ms;--kb:0ms;}
    .slideshow-bg__slide img{transform:none!important;transition:none;}
    .chip .dot,.caption .dot{animation:none;}}
</style></head>

        if(it.pos)img.style.objectPosition=it.pos;s.appendChild(img);root.insertBefore(s,scrim);
        const d=document.createElement('i');if(idx===0)d.className='on';dots.appendChild(d);return s;});
      const pips=[...dots.children];let i=0;slides[0].classList.add('is-active');let timer=null;
      const start=()=>{if(timer||slides.length<2||saveData)return;timer=setInterval(()=>{
        slides[i].classList.remove('is-active');pips[i].classList.remove('on');i=(i+1)%slides.length;
        slides[i].classList.add('is-active');pips[i].classList.add('on');},HOLD);};
      const stop=()=>{clearInterval(timer);timer=null;};start();
      document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
    })();

    (function(){ // integrity knowledge-graph network
      const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
      const canvas=document.getElementById('twinCanvas'),ctx=canvas.getContext('2d');
      // short concept tags pulled from the product Knowledge Graph
      const TERMS=['SCC','CUI','MIC','CO\u2082 Corr','H\u2082S Crack','Naphthenic','Erosion',
                   'RBI','Dynamic RUL','IOW','EEW','API 571','API 581','ASME B31.3',
                   'UT Scan','PAUT','Carbon Steel','Piping','Pressure Vessel'];
      let W=0,H=0,dpr=1,nodes=[],links=[],raf=null,last=0,running=true;
      const LIME='200,229,31',AMBER='245,166,35';
      function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;}
      function build(){
        const n=Math.max(10,Math.min(20,Math.round(W/95)));
        const tags=shuffle(TERMS); let ti=0;
        nodes=[];
        for(let i=0;i<n;i++){
          const primary=Math.random()<0.26;
          nodes.push({x:W*(0.34+Math.random()*0.62),y:H*(0.10+Math.random()*0.80),
            vx:(Math.random()-.5)*0.10,vy:(Math.random()-.5)*0.10,
            r:primary?3.0:1.7,primary,phase:Math.random()*6.283,
            tag:(primary&&W>=760)?tags[ti++%tags.length]:null});
        }
        links=[];
        for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
          const d=Math.hypot(nodes[i].x-nodes[j].x,nodes[i].y-nodes[j].y);
          if(d<W*0.17) links.push({a:i,b:j,t:Math.random(),sp:0.06+Math.random()*0.12,on:Math.random()<0.55});
        }
      }
      function resize(){
        dpr=Math.min(window.devicePixelRatio||1,2);
        W=canvas.clientWidth;H=canvas.clientHeight;
        canvas.width=Math.max(1,W*dpr);canvas.height=Math.max(1,H*dpr);
        ctx.setTransform(dpr,0,0,dpr,0,0);build();
        if(reduce)draw();
      }
      function draw(){
        ctx.clearRect(0,0,W,H);
        for(const L of links){
          const A=nodes[L.a],B=nodes[L.b];
          ctx.strokeStyle='rgba('+LIME+',0.10)';ctx.lineWidth=1;
          ctx.beginPath();ctx.moveTo(A.x,A.y);ctx.lineTo(B.x,B.y);ctx.stroke();
          if(L.on){const px=A.x+(B.x-A.x)*L.t,py=A.y+(B.y-A.y)*L.t;
            ctx.fillStyle='rgba('+AMBER+',0.9)';ctx.beginPath();ctx.arc(px,py,1.7,0,6.283);ctx.fill();}
        }
        ctx.font='10px ui-monospace,SFMono-Regular,Menlo,monospace';ctx.textBaseline='middle';
        for(const nd of nodes){
          if(nd.primary){
            const pulse=(Math.sin(last*0.002+nd.phase)+1)/2;
            ctx.strokeStyle='rgba('+LIME+','+(0.10+0.20*pulse)+')';ctx.lineWidth=1;
            ctx.beginPath();ctx.arc(nd.x,nd.y,nd.r+4+5*pulse,0,6.283);ctx.stroke();
          }
          ctx.fillStyle=nd.primary?'rgba('+LIME+',0.95)':'rgba('+LIME+',0.65)';
          ctx.beginPath();ctx.arc(nd.x,nd.y,nd.r,0,6.283);ctx.fill();
          if(nd.tag){
            const right=nd.x>W*0.84;
            ctx.textAlign=right?'right':'left';
            ctx.fillStyle='rgba('+LIME+',0.5)';
            ctx.fillText(nd.tag, nd.x+(right?-(nd.r+6):(nd.r+6)), nd.y);
          }
        }
      }
      function tick(ts){
        const dt=Math.min(50,ts-last||16);last=ts;
        for(const nd of nodes){nd.x+=nd.vx;nd.y+=nd.vy;
          if(nd.x<W*0.30||nd.x>W)nd.vx*=-1; if(nd.y<H*0.06||nd.y>H*0.94)nd.vy*=-1;}
        for(const L of links){if(L.on){L.t+=L.sp*dt/1000;if(L.t>1)L.t-=1;}}
        draw();
        if(running)raf=requestAnimationFrame(tick);
      }
      window.addEventListener('resize',resize);resize();
      if(!reduce)raf=requestAnimationFrame(tick);
      document.addEventListener('visibilitychange',()=>{
        if(document.hidden){running=false;if(raf)cancelAnimationFrame(raf);raf=null;}
        else if(!reduce&&!raf){running=true;last=performance.now();raf=requestAnimationFrame(tick);}
      });
    })();

    (function(){ // HUD telemetry ticking (only numeric chips)
      const reduce=matchMedia('(prefers-reduced-motion: reduce)').matches; if(reduce)return;
      const vs=[...document.querySelectorAll('.hud .v[data-base]')];
      const fmt=(n,f)=> f==='comma'?Math.round(n).toLocaleString('en-US')
                       : f==='dec2'?n.toFixed(2) : f==='dec1'?n.toFixed(1) : String(Math.round(n));
      let t=null;
      const upd=()=>{for(const el of vs){const base=parseFloat(el.dataset.base),jit=parseFloat(el.dataset.jit),unit=el.dataset.unit;
        const v=Math.max(0,base+(Math.random()*2-1)*jit);el.innerHTML='<b>'+fmt(v,el.dataset.fmt)+'</b> '+unit;}};
      const start=()=>{if(!t){upd();t=setInterval(upd,2200);}};const stop=()=>{clearInterval(t);t=null;};start();
      document.addEventListener('visibilitychange',()=>{document.hidden?stop():start();});
    })();
  </script>
</body></html>
